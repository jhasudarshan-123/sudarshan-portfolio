<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Main background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#bgGradient)"/>
  
  <!-- Inner decorative ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.5"/>
  
  <!-- SJ initials with coding symbols -->
  <g filter="url(#glow)">
    <!-- Left bracket -->
    <path d="M 25 35 L 25 85" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- S letter -->
    <path d="M 35 35 Q 25 45 35 55 Q 45 65 35 75 Q 25 85 35 85" 
          fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- J letter -->
    <path d="M 50 35 L 50 70 Q 50 85 65 85" 
          fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket -->
    <path d="M 85 35 L 85 85" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Code symbols decoration -->
    <text x="60" y="105" font-family="monospace" font-size="8" fill="url(#accentGradient)" text-anchor="middle" opacity="0.7">&lt;/&gt;</text>
  </g>
  
  <!-- Corner dots for tech feel -->
  <circle cx="20" cy="20" r="2" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="100" cy="20" r="2" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="20" cy="100" r="2" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="100" cy="100" r="2" fill="url(#accentGradient)" opacity="0.6"/>
</svg>
